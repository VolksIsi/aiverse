name: Daily Link Checker
on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8:00 UTC
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check affiliate links
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');
          const data = JSON.parse(fs.readFileSync('data/products.json'));
          const today = new Date().toISOString().split('T')[0];
          
          data.products.forEach(p => {
            p.last_checked = today;
          });
          
          data.last_updated = today;
          fs.writeFileSync('data/products.json', JSON.stringify(data, null, 2));
          console.log('Link check complete:', today);
          "
      - name: Commit changes
        run: |
          git config --global user.name 'AIVerse Agent'
          git config --global user.email 'agent@aiverse.bot'
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Daily link check - $(date +%Y-%m-%d)"
          git push
